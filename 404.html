<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — Victor Ng</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    @font-face {
      font-family: 'Instagram Sans';
      font-weight: 400;
      font-display: swap;
      src: url('assets/fonts/InstagramSans-Regular.woff2') format('woff2'),
           url('assets/fonts/InstagramSans-Regular.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Instagram Sans';
      font-weight: 700;
      font-display: swap;
      src: url('assets/fonts/InstagramSans-Bold.woff2') format('woff2'),
           url('assets/fonts/InstagramSans-Bold.ttf') format('truetype');
    }
    :root {
      --ink: #1a1814;
      --ink-muted: #74706a;
      --accent: #2d6a4f;
      --sans: 'Instagram Sans', system-ui, -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 28px;
      padding: 32px;
      background: #ffffff;
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }
    .logo { width: 64px; height: 64px; }
    .code {
      font-size: clamp(3.5rem, 12vw, 6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .msg {
      font-size: clamp(1.05rem, 2.4vw, 1.35rem);
      color: var(--ink-muted);
      max-width: 38ch;
      text-wrap: balance;
    }
    .home {
      display: inline-block;
      margin-top: 8px;
      padding: 13px 28px;
      border-radius: 100px;
      background: var(--ink);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.3s ease;
    }
    .home:hover { background: var(--accent); }
    .home:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  </style>
</head>
<body>
  <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="50" cy="50" r="50" fill="#1a4d2e"/>
    <polygon points="36,29 49,29 62,73 49,73" fill="#fff"/>
    <polygon points="65,29 78,29 71.5,51" fill="#fff"/>
    <circle cx="29" cy="64" r="6" fill="#fff"/>
  </svg>
  <p class="code">404</p>
  <p class="msg">This page wandered off the wheel. Let's get you back to solid ground.</p>
  <a class="home" href="/">Back to home</a>
</body>
</html>
